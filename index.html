<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>snip — Stop paying for what you don't use</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.tailwindcss.com" rel="stylesheet">
  <style>
    :root {
      --snip-black: #0C0C0C;
      --snip-blue: #0057FF;
      --snip-white: #FFFFFF;
      --snip-fog: #F5F5F3;
      --snip-rule: #E8E8E5;
      --snip-mid: #5A5A5A;
      --snip-light: #9A9A9A;
      --snip-alert: #FF3B30;
      --snip-save: #00B87A;
    }

    * {
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: var(--snip-fog);
      color: var(--snip-black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .snip-container {
      width: 100%;
      max-width: 400px;
    }

    .snip-icon {
      background: var(--snip-black);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .snip-logo-text {
      font-weight: 900;
      font-size: 1.25rem;
      letter-spacing: -0.025em;
      color: var(--snip-black);
    }

    .snip-heading {
      font-weight: 900;
      font-size: 1.5rem;
      letter-spacing: -0.03em;
      line-height: 1.2;
      color: var(--snip-black);
      margin-bottom: 0.5rem;
    }

    .snip-subheading {
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--snip-mid);
      max-width: 280px;
      margin: 0 auto;
    }

    .snip-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--snip-light);
      display: block;
      margin-bottom: 0.5rem;
    }

    .snip-card {
      background: var(--snip-white);
      border: 1px solid var(--snip-rule);
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .snip-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--snip-blue);
      color: var(--snip-white);
      padding: 11px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 150ms ease;
      width: 100%;
    }

    .snip-btn:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .snip-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .snip-input {
      width: 100%;
      padding: 11px 14px;
      background: var(--snip-white);
      border: 1px solid var(--snip-rule);
      border-radius: 8px;
      font-size: 14px;
      color: var(--snip-black);
      font-family: inherit;
      transition: border-color 150ms ease;
      margin-bottom: 1rem;
    }

    .snip-input:focus {
      outline: none;
      border-color: var(--snip-blue);
      box-shadow: 0 0 0 3px rgba(0, 87, 255, 0.08);
    }

    .snip-input::placeholder {
      color: var(--snip-light);
    }

    .snip-message {
      font-size: 13px;
      text-align: center;
      padding: 0.5rem 0;
      min-height: 20px;
      line-height: 1.5;
      margin-top: 0.75rem;
    }

    .snip-message.success {
      color: var(--snip-save);
    }

    .snip-message.error {
      color: var(--snip-alert);
    }

    .snip-footer {
      text-align: center;
      font-size: 0.75rem;
      line-height: 1.6;
      color: var(--snip-light);
    }

    .text-center {
      text-align: center;
    }

    .mb-8 {
      margin-bottom: 2rem;
    }

    .mb-6 {
      margin-bottom: 1.5rem;
    }

    .flex {
      display: flex;
    }

    .items-center {
      align-items: center;
    }

    .justify-center {
      justify-content: center;
    }

    .gap-2 {
      gap: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="snip-container">
    <!-- Logo + Heading -->
    <div class="mb-8 text-center">
      <div class="flex items-center justify-center gap-2 mb-6">
        <div class="snip-icon">
          <svg width="20" height="20" viewBox="0 0 72 72" fill="none">
            <path d="M48 22C43 17 36 17 36 17C27.5 17 23 22 23 28C23 34 27.5 37 36 38.5C44.5 40 49 43 49 49C49 55 44.5 59 36 59C28.5 59 23 54 23 54" 
                  stroke="white" stroke-width="5.5" stroke-linecap="round"/>
            <line x1="10" y1="44" x2="62" y2="28" stroke="#0057FF" stroke-width="4.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="snip-logo-text">snip</span>
      </div>
      <h1 class="snip-heading">
        Stop paying.<br>Start saving.
      </h1>
      <p class="snip-subheading">
        One snip a week. That's all it takes to cut subscriptions you don't use.
      </p>
    </div>

    <!-- Form -->
    <div class="snip-card">
      <label class="snip-label">Email address</label>
      <input 
        type="email" 
        id="email" 
        placeholder="you@example.com" 
        class="snip-input"
        autocomplete="email">

      <button 
        id="loginBtn" 
        onclick="sendMagicLink()" 
        class="snip-btn">
        Send Magic Link
      </button>

      <div id="message" class="snip-message success" style="display: none;"></div>
      <div id="error" class="snip-message error" style="display: none;"></div>
    </div>

    <!-- Footer info -->
    <div class="snip-footer">
      We'll send you a secure link to log in.<br>
      No password needed.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const db = supabase.createClient(
      'https://nqzxdusspliuxwbtaqtay.supabase.co',
      'sb_publishable_VuyHxJPvQxRkDL_v9u5scQ_UMh1Nfa3'
    );

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showMessage(elementId, text) {
      const el = document.getElementById(elementId);
      el.textContent = text;
      el.style.display = text ? 'block' : 'none';
      if (elementId === 'message') document.getElementById('error').style.display = 'none';
      if (elementId === 'error') document.getElementById('message').style.display = 'none';
    }

    async function sendMagicLink() {
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('loginBtn');

      showMessage('error', '');
      showMessage('message', '');

      if (!email || !validateEmail(email)) {
        showMessage('error', 'Please enter a valid email address');
        return;
      }

      btn.disabled = true;
      const originalText = btn.textContent;
      btn.textContent = 'Sending...';

      try {
        const { error } = await db.auth.signInWithOtp({
          email,
          options: {
            emailRedirectTo: 'https://clawk507-glitch.github.io/subscription-tracker-mvp/dashboard.html'
          }
        });

        if (error) {
          if (error.message.includes('rate limit')) {
            showMessage('error', 'Too many attempts. Wait 1 minute and try again.');
          } else {
            showMessage('error', error.message);
          }
        } else {
          showMessage('message', 'Check your email for the magic link!');
          document.getElementById('email').value = '';
        }
      } catch (err) {
        showMessage('error', 'Error sending link. Try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    async function checkExisting() {
      try {
        const { data: { user } } = await db.auth.getUser();
        if (user) window.location.href = 'https://clawk507-glitch.github.io/subscription-tracker-mvp/dashboard.html';
      } catch (err) {
        console.log('Auth check:', err.message);
      }
    }

    checkExisting();
  </script>
</body>
</html>
