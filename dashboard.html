<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>snip — Your Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --snip-black: #0C0C0C;
      --snip-blue: #0057FF;
      --snip-white: #FFFFFF;
      --snip-fog: #F5F5F3;
      --snip-rule: #E8E8E5;
      --snip-mid: #5A5A5A;
      --snip-light: #9A9A9A;
      --snip-alert: #FF3B30;
      --snip-alert-pale: #FFF0EE;
      --snip-save: #00B87A;
      --snip-save-pale: #EDFAF4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: var(--snip-fog);
      color: var(--snip-black);
      min-height: 100vh;
      padding: 1rem;
    }

    .snip-container {
      max-width: 640px;
      margin: 0 auto;
    }

    .snip-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .snip-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .snip-icon {
      background: var(--snip-black);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .snip-logo-text {
      font-weight: 900;
      font-size: 1.25rem;
      letter-spacing: -0.03em;
      color: var(--snip-black);
    }

    .snip-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--snip-light);
      margin-bottom: 0.75rem;
      display: block;
    }

    .snip-card {
      background: var(--snip-white);
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .snip-total {
      font-family: 'Geist Mono', monospace;
      font-weight: 900;
      font-size: 2.5rem;
      letter-spacing: -0.04em;
      color: var(--snip-black);
      margin-bottom: 0.25rem;
    }

    .snip-total-meta {
      font-size: 0.75rem;
      color: var(--snip-light);
    }

    .snip-total-small {
      font-family: 'Geist Mono', monospace;
      font-weight: 900;
      font-size: 1.5rem;
      letter-spacing: -0.04em;
      color: var(--snip-black);
      margin-top: 0.25rem;
    }

    .snip-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--snip-blue);
      color: var(--snip-white);
      padding: 11px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 150ms ease;
    }

    .snip-btn:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .snip-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .snip-btn-secondary {
      background: transparent;
      color: var(--snip-blue);
      border: 1px solid var(--snip-rule);
      padding: 8px 14px;
      font-size: 12px;
    }

    .snip-btn-delete {
      background: transparent;
      color: var(--snip-alert);
      border: none;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 150ms ease;
    }

    .snip-btn-delete:hover {
      opacity: 0.7;
    }

    .snip-input {
      width: 100%;
      box-sizing: border-box;
      padding: 11px 14px;
      background: var(--snip-white);
      border: 1px solid var(--snip-rule);
      border-radius: 8px;
      font-size: 14px;
      color: var(--snip-black);
      font-family: inherit;
      transition: border-color 150ms ease;
      display: block;
    }

    .snip-input:focus {
      outline: none;
      border-color: var(--snip-blue);
      box-shadow: 0 0 0 3px rgba(0, 87, 255, 0.08);
    }

    .snip-input::placeholder {
      color: var(--snip-light);
    }

    .snip-form-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .snip-form-row .snip-input {
      flex: 1;
    }

    .snip-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border: 1px solid var(--snip-rule);
      border-radius: 8px;
      gap: 12px;
      transition: background 150ms ease;
      margin-bottom: 0.5rem;
    }

    .snip-row:hover {
      background: var(--snip-fog);
    }

    .snip-row-content {
      flex: 1;
      min-width: 0;
    }

    .snip-row-name {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 2px;
      word-break: break-word;
    }

    .snip-row-meta {
      font-size: 11px;
      color: var(--snip-light);
      font-family: 'Geist Mono', monospace;
    }

    .snip-row-name[contenteditable=true]:focus,
    .snip-row-meta[contenteditable=true]:focus {
      outline: 2px solid var(--snip-blue);
      background-color: var(--snip-alert-pale);
      border-radius: 4px;
      padding: 0 4px;
    }

    .snip-row-name[contenteditable=true]:empty::before {
      content: "Nombre requerido";
      color: var(--snip-light);
    }

    .snip-row-meta[contenteditable=true]:empty::before {
      content: "0.00€";
      color: var(--snip-light);
    }

    .snip-error {
      font-size: 0.75rem;
      color: var(--snip-alert);
      min-height: 1rem;
      margin-top: 0.5rem;
    }

    .snip-empty {
      text-align: center;
      font-size: 0.875rem;
      color: var(--snip-light);
      padding: 2rem 1rem;
    }

    .snip-loading {
      text-align: center;
      padding: 2.5rem 1.25rem;
      color: var(--snip-mid);
    }

    .mb-3 {
      margin-bottom: 0.75rem;
    }

    @media (max-width: 640px) {
      body {
        padding: 0.75rem;
      }

      .snip-card {
        padding: 1.25rem;
      }

      .snip-total {
        font-size: 2rem;
      }

      .snip-header {
        margin-bottom: 1.5rem;
      }

      .snip-logo-text {
        font-size: 1.125rem;
      }

      .snip-icon {
        width: 32px;
        height: 32px;
      }

      .snip-form-row {
        flex-direction: column;
        gap: 0.75rem;
      }

      .snip-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="snip-container">
    <!-- Header -->
    <div class="snip-header">
      <div class="snip-logo">
        <div class="snip-icon">
          <svg width="20" height="20" viewBox="0 0 72 72" fill="none">
            <path d="M48 22C43 17 36 17 36 17C27.5 17 23 22 23 28C23 34 27.5 37 36 38.5C44.5 40 49 43 49 49C49 55 44.5 59 36 59C28.5 59 23 54 23 54" 
                  stroke="white" stroke-width="5.5" stroke-linecap="round"/>
            <line x1="10" y1="44" x2="62" y2="28" stroke="#0057FF" stroke-width="4.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h1 class="snip-logo-text">snip</h1>
      </div>
      <button onclick="logout()" class="snip-btn snip-btn-secondary">
        Logout
      </button>
    </div>

    <!-- Loading State -->
    <div id="loading" class="snip-card">
      <div class="snip-loading">Loading your dashboard...</div>
    </div>

    <!-- Main Content -->
    <div id="content" style="display: none;">
      <!-- Total Spend Card -->
      <div class="snip-card">
        <div class="snip-label">Monthly Spend</div>
        <div class="snip-total">
          <span id="total">0.00€</span>
        </div>
        <p class="snip-total-meta" id="total-meta">0 active subscriptions</p>

        <div class="snip-label mt-4">Weekly Spend</div>
        <div class="snip-total-small">
          <span id="total-weekly">0.00€</span>
        </div>

        <div class="snip-label mt-4">Annual Spend</div>
        <div class="snip-total-small">
          <span id="total-annual">0.00€</span>
        </div>
      </div>

      <!-- Add Subscription -->
      <div class="snip-card">
        <div class="snip-label">Add subscription</div>
        <input 
          type="text" 
          id="name" 
          placeholder="Netflix, Spotify, etc." 
          class="snip-input"
          autocomplete="off">
        <select id="category" class="snip-input" style="margin-top: 0.75rem;">
            <option value="">Select Category</option>
            <option value="Streaming">Streaming</option>
            <option value="Utilities">Utilities</option>
            <option value="Software">Software</option>
            <option value="Education">Education</option>
            <option value="Other">Other</option>
        </select>
        <div class="snip-form-row">
          <input 
            type="number" 
            id="price" 
            placeholder="9.99" 
            step="0.01" 
            min="0.01"
            class="snip-input"
            autocomplete="off">
          <button 
            id="addBtn" 
            onclick="addSub()" 
            class="snip-btn">
            Add
          </button>
        </div>
        <p id="addError" class="snip-error"></p>
      </div>

      <!-- Subscriptions List -->
      <div>
        <div class="snip-label mb-3">Your subscriptions</div>
        <div id="list"></div>
        <p id="empty" class="snip-empty">
          No subscriptions yet. Add one above to get started.
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const db = supabase.createClient(
      'https://nqzxdusspiuxwbtaqtay.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xenhkdXNzcGl1eHvidGFxdGF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDQ0NTYsImV4cCI6MjA4ODkyMDQ1Nn0.nwptjzr5yn_yTBMUQ_lGMktpsjQ8SLlWTA-ZIblKrMU'
    );
    let currentUser = null;

    async function checkAuth() {
      try {
        const { data: { user }, error } = await db.auth.getUser();

        if (error || !user) {
          window.location.href = 'https://clawk507-glitch.github.io/subscription-tracker-mvp/index.html';
          return null;
        }

        currentUser = user;
        return user;
      } catch (err) {
        console.error('Auth error:', err);
        window.location.href = 'https://clawk507-glitch.github.io/subscription-tracker-mvp/index.html';
        return null;
      }
    }

    async function addSub() {
      const name = document.getElementById('name').value.trim();
      const price = parseFloat(document.getElementById('price').value);
      const category = document.getElementById('category').value; // Obtener la categoría
      const btn = document.getElementById('addBtn');
      const errorEl = document.getElementById('addError');

      errorEl.textContent = '';

      if (!name) {
        errorEl.textContent = 'Subscription name required';
        return;
      }

      if (isNaN(price) || price <= 0) {
        errorEl.textContent = 'Price must be greater than 0';
        return;
      }

      // La categoría puede ser vacía, no es un campo obligatorio en este MVP

      btn.disabled = true;
      const originalText = btn.textContent;
      btn.textContent = 'Adding...';

      try {
        const { error } = await db.from('subscriptions').insert([
          { user_id: currentUser.id, name, price, category } // Incluir la categoría
        ]);

        if (error) {
          errorEl.textContent = 'Error: ' + error.message;
        } else {
          document.getElementById('name').value = '';
          document.getElementById('price').value = '';
          document.getElementById('category').value = ''; // Limpiar la categoría después de añadir
          await loadSubs();
        }
      } catch (err) {
        errorEl.textContent = 'Error adding subscription';
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    async function updateSub(element) {
      const id = element.dataset.id;
      const field = element.dataset.field;
      let value = element.innerText.trim();
      const errorEl = document.getElementById('addError'); // Reutilizamos el mismo error para ser más concisos

      errorEl.textContent = ''; // Limpiar errores previos

        // Guardar el valor original antes de cualquier modificación para poder revertir
        if (!element.dataset.originalValue) {
            element.dataset.originalValue = (field === 'price') ? parseFloat(element.innerText).toFixed(2) : element.innerText;
        }

        // Validar el valor antes de actualizar
        if (field === 'price') {
            const numericValue = parseFloat(value);
            if (isNaN(numericValue) || numericValue <= 0) {
                errorEl.textContent = 'El precio debe ser un número positivo.';
                element.innerText = element.dataset.originalValue + '€ / month'; // Volver al valor original y añadir €
                return;
            }
            value = numericValue.toFixed(2); // Asegurar formato de moneda
            element.innerText = value + '€ / month'; // Actualizamos el display INMEDIATAMENTE
        } else if (field === 'name') {
            if (!value) {
                errorEl.textContent = 'El nombre de la suscripción no puede estar vacío.';
                element.innerText = element.dataset.originalValue; // Volver al valor original
                return;
            }
        } else if (field === 'category') {
            // Para la categoría, permitimos valor vacío o cualquier texto
            // No necesitamos validación numérica ni formato especial
        } else {
            // Campo desconocido, no hacer nada
            return;
        }

        // Si el valor no cambió, no hacer nada
        if (value === ((field === 'price') ? parseFloat(element.dataset.originalValue).toFixed(2) : element.dataset.originalValue)) {
            // Asegurarse que el display sea el correcto si no hay cambio (precio podría haber perdido € / month o categoría)
            if (field === 'price') element.innerText = value + '€ / month';
            delete element.dataset.originalValue; // Limpiar el valor original
            return;
        }
        
        try {
            const { error } = await db.from('subscriptions')
                .update({ [field]: value || null }) // Si el valor es vacío, guardar como NULL en la BD
                .eq('id', id);

            if (error) {
                console.error('Error updating subscription:', error);
                errorEl.textContent = 'Error al guardar el cambio.';
                element.innerText = element.dataset.originalValue; // Revertir en caso de error
                if (field === 'price') element.innerText += '€ / month';
            } else {
                // Actualizar el total si se modificó el precio
                if (field === 'price') {
                    await loadSubs(); // Recargar para actualizar el total
                }
                // Limpiar el valor original para la próxima edición
                delete element.dataset.originalValue; 
                element.blur(); // Quitar foco después de éxito
            }
        } catch (err) {
            console.error('Error updating subscription:', err);
            errorEl.textContent = 'Error de red o servidor.';
            element.innerText = element.dataset.originalValue; // Revertir en caso de error
            if (field === 'price') element.innerText += '€ / month';
        }
    }

    async function loadSubs() {
      try {
        const { data, error } = await db
          .from('subscriptions')
          .select('*')
          .eq('user_id', currentUser.id)
          .order('created_at', { ascending: false });

        if (error) {
          console.error('Load error:', error);
          document.getElementById('empty').textContent = 'Error loading subscriptions';
          return;
        }

        let totalMonthly = 0; // Cambiado a totalMonthly
        let html = '';

        if (data.length === 0) {
          document.getElementById('empty').style.display = 'block';
          document.getElementById('list').innerHTML = '';
        } else {
          document.getElementById('empty').style.display = 'none';
          data.forEach(sub => {
            totalMonthly += sub.price; // Sumar al total mensual
            const originalPrice = sub.price.toFixed(2);
            html += `
              <div class="snip-row">
                <div class="snip-row-content">
                  <div class="snip-row-name" contenteditable="true" data-id="${sub.id}" data-field="name" onblur="updateSub(this)" onkeydown="if(event.keyCode===13) { event.preventDefault(); this.blur(); }" data-original-value="${escapeHtml(sub.name)}">${escapeHtml(sub.name)}</div>
                  <div class="snip-row-meta" contenteditable="true" data-id="${sub.id}" data-field="price" onblur="updateSub(this)" onkeydown="if(event.keyCode===13) { event.preventDefault(); this.blur(); }" data-original-value="${originalPrice}">${originalPrice}€ / month</div>
                  <div class="snip-row-meta" contenteditable="true" data-id="${sub.id}" data-field="category" onblur="updateSub(this)" onkeydown="if(event.keyCode===13) { event.preventDefault(); this.blur(); }" data-original-value="${escapeHtml(sub.category || 'Other')}">${escapeHtml(sub.category || 'Other')}</div>
                </div>
                <button 
                  onclick="deleteSub('${sub.id}')" 
                  class="snip-btn-delete"
                  title="Delete">
                  ✕
                </button>
              </div>
            `;
          });
          document.getElementById('list').innerHTML = html;
        }

        // Cálculos para gasto semanal y anual
        const totalWeekly = (totalMonthly / 4.33).toFixed(2);
        const totalAnnual = (totalMonthly * 12).toFixed(2);

        document.getElementById('total').textContent = totalMonthly.toFixed(2) + '€';
        document.getElementById('total-weekly').textContent = totalWeekly + '€';
        document.getElementById('total-annual').textContent = totalAnnual + '€';
        document.getElementById('total-meta').textContent = data.length + ' active subscription' + (data.length !== 1 ? 's' : '');
      } catch (err) {
        console.error('Load error:', err);
        document.getElementById('empty').textContent = 'Error loading subscriptions';
      }
    }

    async function deleteSub(id) {
      if (!confirm('Delete this subscription?')) return;

      try {
        const { error } = await db.from('subscriptions').delete().eq('id', id);

        if (error) {
          alert('Error: ' + error.message);
        } else {
          await loadSubs();
        }
      } catch (err) {
        alert('Error deleting subscription');
      }
    }

    async function logout() {
      try {
        await db.auth.signOut();
      } catch (err) {
        console.error('Logout error:', err);
      }
      window.location.href = 'https://clawk507-glitch.github.io/subscription-tracker-mvp/index.html';
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"'`]/g, m => map[m]);
    }

    async function init() {
      const user = await checkAuth();
      if (user) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        await loadSubs();
      }
    }

    init();
